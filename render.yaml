services:
  - type: web
    name: flow-finance
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
    disks:
      - name: flow-finance-data
        mountPath: /opt/render/project/src/server/data
        sizeGB: 1
